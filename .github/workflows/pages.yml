name: データ更新とGitHub Pages公開

on:
  push:
    branches:
      - main
  schedule:
    # 毎日 10:15（日本時間）
    - cron: "15 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsを準備
        if: github.event_name != 'push'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: 東京法務局から最新データを取得
        if: github.event_name != 'push'
        run: node scraper/scrape.mjs

      - name: 更新データをリポジトリへ保存
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data/kanryo.json app/data/kanryo.js
          if git diff --cached --quiet; then
            echo "データ変更はありません"
          else
            git commit -m "data: 登記完了予定日を自動更新"
            git push
          fi

      - name: GitHub Pagesを準備
        uses: actions/configure-pages@v5

      - name: 公開ファイルをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: app

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesへ公開
        id: deployment
        uses: actions/deploy-pages@v4
