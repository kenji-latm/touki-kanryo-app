name: データ更新とGitHub Pages公開

on:
  push:
    branches:
      - main
  schedule:
    # 日本時間 8:00
    - cron: "0 23 * * *"
    # 日本時間 9:00〜16:00
    - cron: "0 0-7 * * *"
  workflow_dispatch:

env:
  NODE_OPTIONS: --use-system-ca

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Node.jsを準備
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: 依存関係をインストール
        run: npm ci --omit=optional

      - name: PDF読取用ライブラリを追加
        if: github.event_name != 'push'
        run: npm install --no-save --package-lock=false @napi-rs/canvas

      - name: 複数法務局から最新データを取得
        if: github.event_name != 'push'
        run: npm run scrape

      - name: 法務省電子署名一覧を取得
        if: github.event_name != 'push'
        run: npm run scrape:signature

      - name: 更新データをリポジトリへ保存
        if: github.event_name != 'push'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/data app/toshitena/moj-signature-data.js
          if ! git diff --quiet; then
            echo "::error::更新スクリプトがステージ対象外の追跡ファイルを変更しました。workflowのgit add対象を確認してください。"
            git status --short --untracked-files=no
            exit 1
          fi
          if git diff --cached --quiet; then
            echo "データ変更はありません"
          else
            git commit -m "data: 登記完了予定日を自動更新"
            for attempt in 1 2 3; do
              git pull --rebase origin main
              if git push origin HEAD:main; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                exit 1
              fi
              sleep 5
            done
          fi
      - name: Prepare legacy and /agetena/ Pages output
        run: node scripts/prepare-pages.mjs


      - name: GitHub Pagesを準備
        uses: actions/configure-pages@v5

      - name: 公開ファイルをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: GitHub Pagesへ公開
        id: deployment
        uses: actions/deploy-pages@v4
