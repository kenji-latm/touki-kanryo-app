<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="登記完了予定" />
  <title>登記完了予定日</title>
  <link rel="manifest" href="manifest.webmanifest?v=20260629-favorites2" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260629-favorites2" />
  <link rel="icon" href="icon.svg?v=20260629-favorites2" />
  <link rel="stylesheet" href="styles.css?v=20260629-favorites2" />
  <!-- file:// でも動くようデータはJSで読み込む -->
  <script src="data/kanryo.js"></script>
</head>
<body>
  <header class="appbar">
    <div class="appbar__inner">
      <span class="appbar__logo" aria-hidden="true">✓</span>
      <h1 class="appbar__title">登記完了予定日</h1>
    </div>
  </header>

  <main class="container">
    <!-- 超過アラート（保存案件が予定日を超過したときだけ表示） -->
    <button id="alert-banner" class="alert-banner" type="button" hidden></button>

    <!-- 完了予定日チェッカー（主役） -->
    <section class="checker" aria-label="完了予定日を調べる">
      <div id="favorites-panel" class="favorites-panel" hidden>
        <div class="favorites-panel__label">よく使う組み合わせ</div>
        <div id="favorite-shortcuts" class="favorite-shortcuts"></div>
      </div>

      <div class="checker__inputs">
        <label class="field">
          <span class="field__label"><span class="step">1</span>法務局</span>
          <select id="f-jurisdiction"></select>
        </label>

        <fieldset class="field type-field">
          <legend class="field__label"><span class="step">2</span>登記種別</legend>
          <div class="type-switch">
            <label>
              <input type="radio" name="registration-type" value="realEstate" checked />
              <span>不動産（権利）</span>
            </label>
            <label>
              <input type="radio" name="registration-type" value="commercial" />
              <span>商業・法人</span>
            </label>
          </div>
        </fieldset>

        <div class="field">
          <label for="f-office" class="field__label"><span class="step">3</span>管轄（本局・支局・出張所）</label>
          <select id="f-office"></select>
          <button id="favorite-toggle" class="favorite-toggle" type="button" aria-pressed="false" disabled>☆ よく使う組み合わせに追加</button>
        </div>

        <label class="field">
          <span class="field__label"><span class="step">4</span>申請日</span>
          <input id="f-apply" type="date" />
        </label>
      </div>

      <!-- 結果（常時表示・自動更新） -->
      <div id="result" class="result result--empty" aria-live="polite">
        <div class="result__caption">完了予定日</div>
        <div class="result__date" id="result-date">— — —</div>
        <div class="result__hint" id="result-hint">↑ 法務局・登記種別・管轄・申請日を選ぶと、ここに自動表示されます</div>
      </div>

      <!-- 保存（補助動作） -->
      <div class="save-row">
        <input id="f-label" type="text" placeholder="メモ（任意）例：渋谷・所有権移転" autocomplete="off" />
        <button id="f-add" class="btn btn--primary" type="button" disabled>一覧に保存</button>
      </div>
    </section>

    <!-- 保存先 -->
    <section id="storage-panel" class="storage-panel" aria-label="保存先の設定" hidden>
      <div class="storage-panel__head">
        <div>
          <h2 class="storage-panel__title">保存先</h2>
          <p id="sync-status" class="storage-panel__status">この端末だけに保存中。共有DBには送信されません。</p>
        </div>
      </div>
      <div class="storage-tabs" role="group" aria-label="保存先を選択">
        <button id="mode-local" class="storage-tab is-active" type="button" aria-pressed="true">この端末</button>
        <button id="mode-shared" class="storage-tab" type="button" aria-pressed="false">事務所共有</button>
      </div>
      <form id="shared-login" class="shared-login" hidden>
        <input id="shared-email" type="email" placeholder="メールアドレス" autocomplete="email" />
        <input id="shared-password" type="password" placeholder="パスワード" autocomplete="current-password" />
        <button class="btn btn--primary" type="submit">ログイン</button>
      </form>
      <div id="shared-session" class="shared-session" hidden>
        <label class="shared-office-field">
          <span>事務所</span>
          <select id="shared-office"></select>
        </label>
        <div class="shared-session__actions">
          <button id="shared-refresh" class="mini" type="button">更新</button>
          <button id="shared-logout" class="mini mini--del" type="button">ログアウト</button>
        </div>
      </div>
      <p id="shared-message" class="shared-message" hidden></p>
    </section>

    <!-- 一覧 -->
    <section aria-label="保存した案件">
      <div class="list-head">
        <h2 id="list-title" class="list-head__title">保存した案件</h2>
        <label class="toggle">
          <input id="show-done" type="checkbox" />
          <span>完了も表示</span>
        </label>
      </div>
      <div id="list" class="list"></div>
      <p id="empty" class="empty">保存した案件はここに並びます。予定日を過ぎた案件だけ、静かにお知らせします。</p>
    </section>
  </main>

  <footer class="footer">
    <p id="data-meta"></p>
    <p class="footer__note">対象：掲載データのある法務局・不動産（権利）登記／商業・法人登記。保存案件は、保存時点の完了予定日を保持します。完了予定日は目安で、不備・実地調査・事前通知等により翌日以降になる場合があります（出典：各法務局）。</p>
  </footer>

  <script src="shared-config.js?v=20260629-favorites2"></script>
  <script src="app.js?v=20260629-favorites2"></script>
</body>
</html>
