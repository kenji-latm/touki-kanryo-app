<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="登記完了予定" />
  <title>登記完了予定日</title>
  <link rel="manifest" href="manifest.webmanifest?v=20260622-ui2" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png?v=20260622-ui2" />
  <link rel="icon" href="icon.svg?v=20260622-ui2" />
  <link rel="stylesheet" href="styles.css?v=20260622-ui2" />
  <!-- file:// でも動くようデータはJSで読み込む -->
  <script src="data/kanryo.js"></script>
</head>
<body>
  <header class="appbar">
    <div class="appbar__inner">
      <span class="appbar__logo" aria-hidden="true">✓</span>
      <h1 class="appbar__title">登記完了予定日</h1>
    </div>
  </header>

  <main class="container">
    <!-- 超過アラート（保存案件が予定日に到達/超過したとき表示） -->
    <button id="alert-banner" class="alert-banner" type="button" hidden></button>

    <!-- 完了予定日チェッカー（主役） -->
    <section class="checker" aria-label="完了予定日を調べる">
      <div class="checker__inputs">
        <fieldset class="field type-field">
          <legend class="field__label"><span class="step">1</span>登記種別</legend>
          <div class="type-switch">
            <label>
              <input type="radio" name="registration-type" value="realEstate" checked />
              <span>不動産（権利）</span>
            </label>
            <label>
              <input type="radio" name="registration-type" value="commercial" />
              <span>商業・法人</span>
            </label>
          </div>
        </fieldset>

        <label class="field">
          <span class="field__label"><span class="step">2</span>管轄（法務局）</span>
          <select id="f-office"></select>
        </label>

        <label class="field">
          <span class="field__label"><span class="step">3</span>申請日</span>
          <input id="f-apply" type="date" />
        </label>
      </div>

      <!-- 結果（常時表示・自動更新） -->
      <div id="result" class="result result--empty" aria-live="polite">
        <div class="result__caption">完了予定日</div>
        <div class="result__date" id="result-date">— — —</div>
        <div class="result__hint" id="result-hint">↑ 管轄と申請日を選ぶと、ここに自動表示されます</div>
      </div>

      <!-- 保存（補助動作） -->
      <div class="save-row">
        <input id="f-label" type="text" placeholder="メモ（任意）例：渋谷・所有権移転" autocomplete="off" />
        <button id="f-add" class="btn btn--primary" type="button" disabled>一覧に保存</button>
      </div>
    </section>

    <!-- 一覧 -->
    <section aria-label="保存した案件">
      <div class="list-head">
        <h2 class="list-head__title">保存した案件</h2>
        <label class="toggle">
          <input id="show-done" type="checkbox" />
          <span>完了も表示</span>
        </label>
      </div>
      <div id="list" class="list"></div>
      <p id="empty" class="empty">保存した案件はここに並びます。予定日を過ぎた案件だけ、静かにお知らせします。</p>
    </section>
  </main>

  <footer class="footer">
    <p id="data-meta"></p>
    <p class="footer__note">対象：東京法務局・不動産（権利）登記／商業・法人登記。完了予定日は目安で、不備・実地調査・事前通知等により翌日以降になる場合があります（出典：東京法務局）。</p>
  </footer>

  <script src="app.js?v=20260622-ui2"></script>
</body>
</html>
